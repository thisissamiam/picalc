<!DOCTYPE html>
<html>
<body>
<div id="s">idle</div>
<div id="p"></div>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<script>
const DOMAIN = "https://bestuserever.pythonanywhere.com"

let run = false
let w = "u" + Math.random()

async function loop() {
  if (!run) return

  document.getElementById("s").innerText = "requesting"

  try {
    let t = await fetch(`${DOMAIN}/get_task?w=${w}`).then(r => r.json())

    let sum = 0
    for (let k = t.start_k; k < t.end_k; k++) {
      sum += Math.pow(-1, k) / (2 * k + 1)
    }
    sum *= 4

    document.getElementById("s").innerText = "submitting"

    await fetch(`${DOMAIN}/submit`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        task_id: t.task_id,
        value: sum,
        worker: w
      })
    })

    let s = await fetch(`${DOMAIN}/status`).then(r => r.json())
    document.getElementById("p").innerText =
      `π: ${s.pi} | tasks: ${s.tasks_done} | speed: ${s.speed}`

    setTimeout(loop, 0)

  } catch (e) {
    document.getElementById("s").innerText = "error retrying in 3s"
    setTimeout(loop, 3000)
  }
}

function start() {
  run = true
  loop()
}

function stop() {
  run = false
  document.getElementById("s").innerText = "stopped"
}
</script>

</body>
</html>
