<!DOCTYPE html>
<html>
<body>

<div id="s">idle</div>
<div id="p"></div>
<div id="e"></div>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<script>
const DOMAIN = "https://bestuserever.pythonanywhere.com"

let run = false
let w = "u" + Math.random()

async function loop() {
  if (!run) return

  document.getElementById("s").innerText = "requesting"
  document.getElementById("e").innerText = ""

  try {
    let res = await fetch(`${DOMAIN}/get_task?w=${w}`)

    if (!res.ok) {
      throw new Error("GET /get_task failed: " + res.status)
    }

    let t = await res.json()

    let sum = 0
    for (let k = t.start_k; k < t.end_k; k++) {
      sum += Math.pow(-1, k) / (2 * k + 1)
    }
    sum *= 4

    document.getElementById("s").innerText = "submitting"

    let sres = await fetch(`${DOMAIN}/submit`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        task_id: t.task_id,
        value: sum,
        worker: w
      })
    })

    if (!sres.ok) {
      throw new Error("POST /submit failed: " + sres.status)
    }

    let s = await fetch(`${DOMAIN}/status`)
    if (!s.ok) {
      throw new Error("GET /status failed: " + s.status)
    }

    let data = await s.json()

    document.getElementById("p").innerText =
      `π: ${data.pi} | tasks: ${data.tasks_done} | speed: ${data.speed}`

    setTimeout(loop, 0)

  } catch (e) {
    document.getElementById("e").innerText =
      "ERROR: " + e.message + " → retrying in 3s"

    setTimeout(loop, 3000)
  }
}

function start() {
  run = true
  loop()
}

function stop() {
  run = false
  document.getElementById("s").innerText = "stopped"
}
</script>

</body>
</html>
