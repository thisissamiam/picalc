<!DOCTYPE html>
<html>
<body>

<h2>Worker</h2>

<div id="status">idle</div>
<div id="url"></div>
<div id="out"></div>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<script>

const DOMAIN = "https://bestuserever.pythonanywhere.com"

let run = false
let workerId = "w" + Math.random()

async function loop() {
  if (!run) return

  document.getElementById("status").innerText = "requesting task..."

  const taskURL = `${DOMAIN}/get_task?w=${workerId}`
  document.getElementById("url").innerText = "GET " + taskURL

  try {
    let t = await fetch(taskURL).then(r => r.json())

    if (t.done) {
      document.getElementById("status").innerText = "ALL DONE"
      return
    }

    let found = null

    for (let i = t.start; i < t.end; i++) {
      let guess = i.toString(36)  // simple encoding

      if (guess === "secret") {   // placeholder match logic
        found = guess
        break
      }
    }

    document.getElementById("status").innerText = "submitting..."

    await fetch(`${DOMAIN}/submit`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        task_id: t.task_id,
        result: found
      })
    })

    document.getElementById("status").innerText = "cycle complete"

    setTimeout(loop, 200)

  } catch (e) {
    document.getElementById("status").innerText =
      "ERROR: " + e + " retrying in 3s"

    setTimeout(loop, 3000)
  }
}

function start() {
  run = true
  loop()
}

function stop() {
  run = false
}

</script>

</body>
</html>
