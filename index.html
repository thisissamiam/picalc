<!DOCTYPE html>
<html>
<body>
<div id="s">idle</div>
<div id="p"></div>

<script>
let run=false,w="u"+Math.random()

async function loop(){
  if(!run) return

  document.getElementById("s").innerText="requesting"

  let t=await fetch("/get_task?w="+w).then(r=>r.json())

  let sum=0
  for(let k=t.start_k;k<t.end_k;k++){
    sum += Math.pow(-1,k)/(2*k+1)
  }
  sum*=4

  document.getElementById("s").innerText="done"

  await fetch("/submit",{method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({task_id:t.task_id,value:sum,worker:w})
  })

  let s=await fetch("/status").then(r=>r.json())
  document.getElementById("p").innerText=s.pi

  setTimeout(loop,0)
}

function start(){run=true;loop()}
function stop(){run=false}
</script>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

</body>
</html>
